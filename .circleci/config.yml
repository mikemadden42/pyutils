version: 2.1 # Upgraded to 2.1 to enable modern CircleCI features

jobs:
  build:
    docker:
      # The 'circleci/' image namespace is legacy. 'cimg/' is the modern, faster equivalent.
      - image: cimg/python:3.12

    working_directory: ~/repo

    steps:
      - checkout

      # Cache keys bumped to 'v2' to ensure we don't accidentally pull in an old Python 3.9 cache
      - restore_cache:
          keys:
            - v2-dependencies-{{ checksum "requirements.txt" }}
            - v2-dependencies-

      - run:
          name: Install dependencies
          command: |
            python3 -m venv venv
            . venv/bin/activate
            pip install --upgrade pip
            pip install -r requirements.txt

      - save_cache:
          paths:
            - ./venv
          key: v2-dependencies-{{ checksum "requirements.txt" }}

      - run:
          name: Run tests
          command: |
            . venv/bin/activate
            # Ensure the directory exists before pytest tries to write the XML
            mkdir -p test-reports 
            pytest --junitxml=test-reports/junit.xml -v

      # Added this step! It parses your JUnit XML and lights up the "Tests" tab in the CircleCI UI
      - store_test_results:
          path: test-reports

      - store_artifacts:
          path: test-reports
          destination: test-reports
